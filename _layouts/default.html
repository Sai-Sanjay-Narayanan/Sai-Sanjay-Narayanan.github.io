<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/style.css">

    <script>
    MathJax = {
      tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      tags: 'ams'
      },
      svg: {
        fontCache: 'global'
      },
    };
    </script>

    <script type="text/javascript" id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>

  </head>

  
  <body>
    <h1 style="font-family:sans-serif;padding:0;"><a href="/index.html" style="color:black;text-decoration:none;">Sai Sanjay's Website</a></h1>
    <ul class="navigation">
      <li><a href = "/blogs/blog_home.html">Blogs</a></li>
      <li><a href = "/research/research.html">Research</a></li>
    </ul>
    {{ content }}

    {% assign updated_at = page.updated | default: page.last_updated | default: page.date | default: site.time %}
    <p class="last-updated">
      Updated on:
      <time
        datetime="{{ updated_at | date_to_xmlschema }}"
        data-page-updated="{% if page.updated or page.last_updated or page.date %}true{% else %}false{% endif %}"
      >{{ updated_at | date: "%B %-d, %Y at %-I:%M %p" }}</time>
    </p>

    <script>
        function toggleBlogs(blogID) {
            let blogList = document.getElementById(blogID);
            blogList.style.display = (blogList.style.display === "none" || blogList.style.display === "") ? "block" : "none";
        }
    </script>

    <script>
        document.querySelectorAll(".toggle-proof").forEach(button => {
            button.addEventListener("click", function() {
                let proof = this.nextElementSibling; // Get the next element (the proof)
                if (proof && proof.classList.contains("proof")) {
                    proof.style.display = (proof.style.display === "none" || proof.style.display === "") ? "block" : "none";
                }
            });
        });
    </script>

    <script>
        const lastUpdated = document.querySelector(".last-updated time");
        const modifiedDate = new Date(document.lastModified);
        const hasPageUpdatedDate = lastUpdated && lastUpdated.dataset.pageUpdated === "true";

        if (lastUpdated && !hasPageUpdatedDate && !Number.isNaN(modifiedDate.getTime())) {
            lastUpdated.dateTime = modifiedDate.toISOString();
            lastUpdated.textContent = modifiedDate.toLocaleString(undefined, {
                year: "numeric",
                month: "long",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit"
            });
        }
    </script>

  </body>
</html>
